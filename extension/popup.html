<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #21262d;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4af0b0, #1a73e8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      color: #0d1117;
    }
    h1 { font-size: 16px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #8b949e; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #161b22;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f85149;
    }
    .dot.connected { background: #3fb950; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      background: #161b22;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #4af0b0;
    }
    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
    }
    input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px 10px;
      color: #c9d1d9;
      font-size: 12px;
      margin-top: 6px;
    }
    input:focus { outline: none; border-color: #4af0b0; }
    label { font-size: 11px; color: #8b949e; }
    button {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: #4af0b0;
      color: #0d1117;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #3dd69e; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">C</div>
    <div>
      <h1>Cortex</h1>
      <div class="subtitle">Ambient Intelligence</div>
    </div>
  </div>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="tabCount">0</div>
      <div class="stat-label">Tabs Tracked</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="beliefCount">0</div>
      <div class="stat-label">Beliefs</div>
    </div>
  </div>

  <div class="settings">
    <label>Backend URL</label>
    <input type="text" id="backendUrl" placeholder="ws://localhost:8080/ws">
    <button id="saveBtn">Save & Reconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
